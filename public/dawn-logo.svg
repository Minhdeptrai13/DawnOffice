<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <clipPath id="horizonClip">
      <rect x="0" y="0" width="100" height="72"/>
    </clipPath>
  </defs>
  <g clip-path="url(#horizonClip)">
    <!-- Sun -->
    <circle cx="50" cy="65" r="28" fill="url(#sunGrad)"/>
    <!-- Buildings -->
    <rect x="22" y="45" width="14" height="27" rx="2" fill="#334155"/>
    <rect x="42" y="28" width="16" height="44" rx="2" fill="#0f172a"/>
    <rect x="64" y="52" width="14" height="20" rx="2" fill="#475569"/>
  </g>
  <!-- Horizon line -->
  <line x1="8" y1="72" x2="92" y2="72" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
</svg>
